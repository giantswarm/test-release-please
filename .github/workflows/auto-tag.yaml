---
# yamllint disable rule:truthy
# Push-based release tagger.
#
# On every push to main, inspects conventional commits since the last v*.*.*
# tag via git-cliff and creates a new tag if a bump is warranted. The tag push
# then triggers the publisher (see release.yaml for goreleaser; for chart and
# service repos this would be the CircleCI architect pipeline firing on the
# same /^v.*/ tag filter).
#
# No release PR. No human approval step. The mechanism that protects against
# bad releases is the pre-merge CI on the feature PRs that landed these
# commits — once they're on main, they ship.
name: Auto-tag

on:
  push:
    branches: [main]

permissions:
  contents: write   # needed to push tags

# Avoid two tagger runs racing on rapid back-to-back merges. A second push
# while a tag is being computed waits for the first to finish.
concurrency:
  group: auto-tag
  cancel-in-progress: false

jobs:
  tag:
    name: Tag
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0        # full history so git-cliff sees every commit
          fetch-tags: true      # ensure tags are present (shallow runners drop them by default)

      - name: Compute next version with git-cliff
        id: cliff
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5  # v4.8.0
        with:
          config: cliff.toml
          args: --bumped-version

      - name: Decide whether to tag
        id: decide
        env:
          NEXT: ${{ steps.cliff.outputs.version }}
        run: |
          set -euo pipefail
          last=$(git tag --list 'v*.*.*' --sort=-v:refname | head -1)
          echo "last tag: ${last:-<none>}"
          echo "next computed: ${NEXT:-<empty>}"
          if [ -z "${NEXT}" ] || [ "${NEXT}" = "${last}" ]; then
            echo "No releasable commits since ${last:-inception}; skipping tag."
            echo "tag=" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${NEXT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Push tag
        if: steps.decide.outputs.tag != ''
        env:
          TAG: ${{ steps.decide.outputs.tag }}
          # Attribute the tag to the person whose push triggered the workflow.
          # For PR-merge pushes this is the merger; for direct pushes it's the
          # pusher. Either way, "the person responsible for this push to main."
          GIT_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          git config user.name  "$GIT_ACTOR"
          git config user.email "${GIT_ACTOR}@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
