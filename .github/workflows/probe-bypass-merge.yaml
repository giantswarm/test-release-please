# One-off probe to verify that the release-please-workflow App can use its
# bypass_pull_request_allowances entry to merge PR #2 without an approving review.
# Delete this file after the experiment.
name: Probe bypass merge

on:
  workflow_dispatch:
    inputs:
      pr-number:
        description: PR to bypass-merge
        required: true
        default: "2"

permissions: {}

jobs:
  probe:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate App token
        id: token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}

      - name: Attempt direct merge as bypass actor
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr-number }}
        run: |
          set -euo pipefail
          echo "Pre-merge PR state:"
          gh pr view "$PR_NUMBER" --json state,mergeStateStatus,reviewDecision

          echo "Attempting bypass merge..."
          gh pr merge "$PR_NUMBER" --squash --delete-branch
          echo "Merge succeeded."
