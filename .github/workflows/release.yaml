---
# yamllint disable rule:truthy
# Publish a GitHub Release with built binaries when a v*.*.* tag is pushed.
# For a chart or service repo this would be the CircleCI architect pipeline
# instead — same trigger (tag push), different publisher.
name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # goreleaser needs to create the GitHub Release

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0   # goreleaser reads tags + commit history for the changelog

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # Separate install step so a failure installing goreleaser is
      # distinguishable from a failure during the release itself.
      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # v7.2.2
        with:
          distribution: goreleaser
          version: latest
          args: --version

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # v7.2.2
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
